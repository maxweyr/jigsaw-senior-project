name: Build Godot Project (Release)

on:
  workflow_dispatch: {}
  release:
    types: [created]

jobs:
  export:
    runs-on: ubuntu-latest

    container:
      image: barichello/godot-ci:4.6
      options: --user root

    strategy:
      fail-fast: false
      matrix:
        include:
          - preset: LinuxDesktop
            out: build/linux/jigsaw.x86_64
            artifact: Client-linux
          - preset: LinuxServer
            out: build/server/jigsaw_server.x86_64
            artifact: Server-linux
          - preset: Windows
            out: build/windows/jigsaw.exe
            artifact: Client-windows
          - preset: macOS
            out: build/mac/jigsaw.zip
            artifact: Client-mac

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      # Optional but helpful debug
      - name: Show environment
        run: |
          whoami
          godot --version || true

      # Templates path setup (mirrors godot-ci's own workflow style)
      - name: Setup export templates dir
        run: |
          mkdir -p ~/.local/share/godot/export_templates/

      # Only needed for Linux exports; harmless for others
      - name: Install Linux runtime deps
        run: |
          apt-get update
          apt-get install -y --no-install-recommends fontconfig libfontconfig1
          rm -rf /var/lib/apt/lists/*

      - name: Make output folders
        run: |
          mkdir -p build/linux build/server build/windows build/mac

      - name: Export
        run: |
          godot --headless --verbose --export-release "${{ matrix.preset }}" "${{ matrix.out }}"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.out }}
